# Chromasync Target Spec Schema
#
# Target specs define how semantic tokens are rendered into output files
# for a specific application or environment.
#
# Location:
#   Built-in:  compiled into chromasync-renderers (kitty, alacritty, foot, etc.)
#   User:      ~/.config/chromasync/targets/<name>.toml
#   Pack:      <pack-root>/targets/<name>.toml
#   Inline:    referenced by path in CLI or batch manifest

# --- Required fields ---

name = "my-target"            # Target name (string, required)
                              # Must be lowercase letters, digits, '-', or '_'

# --- Optional fields ---

description = "A short human-readable description of this target."  # (string, optional)

extends = "base-target"       # Name of another target to inherit from (string, optional).
                              # Artifacts from the base target are included unless
                              # overridden by an artifact with the same file_name.

# --- Artifact definitions ---
#
# Each [[artifacts]] entry defines one output file:
#
#   file_name  (string, required)  — Output file name. No path separators,
#              not "." or "..".
#
#   template   (string, required)  — File content template with placeholders.
#
# Placeholder syntax:
#
#   {{tokens.<TOKEN_NAME>}}                — Semantic token value (#rrggbb)
#   {{tokens.<TOKEN_NAME> | hex_no_hash}}  — Token value without # prefix
#   {{tokens.<TOKEN_NAME> | rgba(FF)}}     — RGBA hex format with alpha
#   {{ctx.mode}}                           — Theme mode (dark/light)
#   {{ctx.template_name}}                  — Template name
#   {{ctx.output_dir}}                     — Output directory path
#   {{ctx.seed}}                           — Seed color
#
# Available token names (17 total):
#   bg, bg_secondary, surface, surface_elevated,
#   text, text_muted,
#   border, border_strong,
#   accent, accent_hover, accent_active, accent_fg,
#   selection, link,
#   success, warning, error

# --- Example artifact ---

[[artifacts]]
file_name = "colors.conf"
template = """
# Generated by chromasync ({{ctx.template_name}}, {{ctx.mode}} mode)
background {{tokens.bg}}
foreground {{tokens.text}}
cursor     {{tokens.accent}}
selection_background {{tokens.selection}}
selection_foreground {{tokens.text}}

color0  {{tokens.bg_secondary}}
color1  {{tokens.error}}
color2  {{tokens.success}}
color3  {{tokens.warning}}
color4  {{tokens.link}}
color5  {{tokens.accent}}
color6  {{tokens.selection}}
color7  {{tokens.text_muted}}
color8  {{tokens.surface_elevated}}
color9  {{tokens.error}}
color10 {{tokens.success}}
color11 {{tokens.warning}}
color12 {{tokens.accent_hover}}
color13 {{tokens.accent_active}}
color14 {{tokens.border_strong}}
color15 {{tokens.text}}
"""

