# Chromasync Pack Manifest Schema (pack.toml)
#
# A pack bundles templates and/or target specs for distribution.
# Place pack.toml at the root of the pack directory.
#
# Discovery locations (searched for pack.toml):
#   ~/.config/chromasync/packs/<pack-name>/
#   ~/.local/share/chromasync/packs/<pack-name>/
#   .chromasync/packs/<pack-name>/  (project-local)

# --- Required fields ---

name = "my-pack"              # Pack name (string, required)
                              # Must be lowercase letters, digits, '-', or '_'
version = "0.1.0"            # Semantic version (string, required)

# --- Optional fields ---

description = "A short human-readable description of this pack."  # (string, optional)
author = "Your Name"          # Pack author (string, optional)
license = "MIT"               # License identifier (string, optional)
homepage = "https://example.com"  # Project homepage URL (string, optional)

# --- Asset directories ---
#
# At least one of [templates] or [targets] must be defined.
# All paths are relative to the pack root directory.
# If a section is omitted, the default directory ("templates/" or "targets/")
# is used if it exists.

[templates]
paths = ["templates"]         # Array of strings (optional) — directories containing
                              # template .toml files

[targets]
paths = ["targets"]           # Array of strings (optional) — directories containing
                              # target spec .toml files
