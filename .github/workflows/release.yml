name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker (arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p chromasync-cli --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/chromasync chromasync-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromasync-linux-${{ matrix.arch }}
          path: chromasync-linux-${{ matrix.arch }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ inputs.tag }}',
            });

            // Split into lines, drop the "What's Changed" heading and any
            // trailing "Full Changelog" footer line, then keep only the
            // bullet points so the body stays concise.
            const lines = data.body.split('\n');
            const bullets = lines.filter(l => l.startsWith('* '));
            const footer = lines.find(l => l.startsWith('**Full Changelog**')) ?? '';

            const sections = { feat: [], fix: [], other: [] };
            for (const bullet of bullets) {
              if (/feat(\(.+?\))?[!:]/.test(bullet))      sections.feat.push(bullet);
              else if (/fix(\(.+?\))?[!:]/.test(bullet))  sections.fix.push(bullet);
              else                                         sections.other.push(bullet);
            }

            const parts = [];
            if (sections.feat.length)  parts.push('### Features\n'  + sections.feat.join('\n'));
            if (sections.fix.length)   parts.push('### Bug Fixes\n' + sections.fix.join('\n'));
            if (sections.other.length) parts.push('### Changes\n'   + sections.other.join('\n'));
            if (footer)                parts.push(footer);

            return parts.join('\n\n');

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body: ${{ steps.notes.outputs.result }}
          files: |
            artifacts/chromasync-linux-amd64
            artifacts/chromasync-linux-arm64
