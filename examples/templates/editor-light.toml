#:schema ../../schemas/template.json
name = "editor"
mode = "light"
description = "Example light template tuned for code editors with rich syntax contrast."

[tokens.bg]
family = "neutral"
tone = 0.98
chroma = 0.004

[tokens.bg_secondary]
family = "neutral"
tone = 0.92
chroma = 0.006

[tokens.surface]
family = "neutral"
tone = 0.95
chroma = 0.005

[tokens.surface_elevated]
family = "neutral_variant"
tone = 0.90
chroma = 0.008

[tokens.text]
family = "neutral"
tone = 0.12

[tokens.text_muted]
family = "neutral_variant"
tone = 0.42
chroma_scale = 0.55

[tokens.border]
family = "neutral_variant"
tone = 0.78
chroma_scale = 0.65

[tokens.border_strong]
family = "neutral_variant"
tone = 0.68
chroma_scale = 0.80

[tokens.accent]
family = "primary"
tone = 0.50
chroma = 0.14

[tokens.accent_hover]
family = "primary"
tone = 0.44
chroma = 0.16

[tokens.accent_active]
family = "secondary"
tone = 0.52
chroma = 0.12

[tokens.accent_fg]
family = "neutral"
tone = 0.98

[tokens.selection]
family = "primary"
tone = 0.85
chroma_scale = 0.40

[tokens.link]
family = "info"
tone = 0.50
chroma = 0.14

[tokens.success]
family = "success"
tone = 0.55
chroma = 0.13

[tokens.warning]
family = "warning"
tone = 0.58
chroma = 0.14

[tokens.error]
family = "error"
tone = 0.55
chroma = 0.16
