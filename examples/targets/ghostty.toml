#:schema ../../schemas/target.json
name = "ghostty"
description = "Example user-defined Ghostty target."

[[artifacts]]
file_name = "colors.txt"
template = """
background = {{tokens.bg}}
foreground = {{tokens.text}}
cursor-color = {{tokens.accent}}
cursor-text = {{tokens.accent_fg}}
selection-background = {{tokens.selection}}
selection-foreground = {{tokens.text}}
palette = 0={{tokens.bg_secondary}}
palette = 1={{tokens.error}}
palette = 2={{tokens.success}}
palette = 3={{tokens.warning}}
palette = 4={{tokens.link}}
palette = 5={{tokens.accent}}
palette = 6={{tokens.selection}}
palette = 7={{tokens.text_muted}}
palette = 8={{tokens.surface_elevated}}
palette = 9={{tokens.error}}
palette = 10={{tokens.success}}
palette = 11={{tokens.warning}}
palette = 12={{tokens.accent_hover}}
palette = 13={{tokens.accent_active}}
palette = 14={{tokens.border_strong}}
palette = 15={{tokens.text}}
"""
