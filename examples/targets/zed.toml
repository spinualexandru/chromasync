#:schema ../../schemas/target.json
name = "zed"
description = "Example user-defined Zed Editor theme target."
preferred_template = "editor"
chroma = "normal"

[[artifacts]]
file_name = "chromasync.json"
template = """
{
  "$schema": "https://zed.dev/schema/themes/v0.2.0.json",
  "name": "Chromasync",
  "author": "Chromasync",
  "themes": [
    {
      "name": "Chromasync {{ctx.mode}}",
      "appearance": "{{ctx.mode}}",
      "style": {
        "border": "#{{tokens.border | hex_no_hash}}ff",
        "border.variant": "#{{tokens.border | hex_no_hash}}ff",
        "border.focused": "#{{tokens.accent | hex_no_hash}}ff",
        "border.selected": "#{{tokens.accent_active | hex_no_hash}}ff",
        "border.transparent": "#00000000",
        "border.disabled": "#{{tokens.border | hex_no_hash}}80",
        "elevated_surface.background": "#{{tokens.surface_elevated | hex_no_hash}}ff",
        "surface.background": "#{{tokens.surface | hex_no_hash}}ff",
        "background": "#{{tokens.bg_secondary | hex_no_hash}}ff",
        "element.background": "#{{tokens.surface | hex_no_hash}}ff",
        "element.hover": "#{{tokens.surface_elevated | hex_no_hash}}ff",
        "element.active": "#{{tokens.selection | hex_no_hash}}ff",
        "element.selected": "#{{tokens.selection | hex_no_hash}}ff",
        "element.disabled": "#{{tokens.surface | hex_no_hash}}80",
        "drop_target.background": "#{{tokens.selection | hex_no_hash}}80",
        "ghost_element.background": "#00000000",
        "ghost_element.hover": "#{{tokens.surface_elevated | hex_no_hash}}ff",
        "ghost_element.active": "#{{tokens.selection | hex_no_hash}}ff",
        "ghost_element.selected": "#{{tokens.selection | hex_no_hash}}ff",
        "ghost_element.disabled": "#{{tokens.surface | hex_no_hash}}80",
        "text": "#{{tokens.text | hex_no_hash}}ff",
        "text.muted": "#{{tokens.text_muted | hex_no_hash}}ff",
        "text.placeholder": "#{{tokens.text_muted | hex_no_hash}}ff",
        "text.disabled": "#{{tokens.text_muted | hex_no_hash}}80",
        "text.accent": "#{{tokens.accent | hex_no_hash}}ff",
        "icon": "#{{tokens.text | hex_no_hash}}ff",
        "icon.muted": "#{{tokens.text_muted | hex_no_hash}}ff",
        "icon.disabled": "#{{tokens.text_muted | hex_no_hash}}80",
        "icon.placeholder": "#{{tokens.text_muted | hex_no_hash}}ff",
        "icon.accent": "#{{tokens.accent | hex_no_hash}}ff",
        "status_bar.background": "#{{tokens.bg_secondary | hex_no_hash}}ff",
        "title_bar.background": "#{{tokens.bg_secondary | hex_no_hash}}ff",
        "title_bar.inactive_background": "#{{tokens.surface | hex_no_hash}}ff",
        "toolbar.background": "#{{tokens.bg | hex_no_hash}}ff",
        "tab_bar.background": "#{{tokens.surface | hex_no_hash}}ff",
        "tab.inactive_background": "#{{tokens.surface | hex_no_hash}}ff",
        "tab.active_background": "#{{tokens.bg | hex_no_hash}}ff",
        "search.match_background": "#{{tokens.accent | hex_no_hash}}66",
        "search.active_match_background": "#{{tokens.warning | hex_no_hash}}66",
        "panel.background": "#{{tokens.surface | hex_no_hash}}ff",
        "panel.focused_border": null,
        "pane.focused_border": null,
        "scrollbar.thumb.background": "#{{tokens.text_muted | hex_no_hash}}4c",
        "scrollbar.thumb.hover_background": "#{{tokens.border | hex_no_hash}}ff",
        "scrollbar.thumb.border": "#{{tokens.border | hex_no_hash}}ff",
        "scrollbar.track.background": "#00000000",
        "scrollbar.track.border": "#{{tokens.border | hex_no_hash}}40",
        "editor.foreground": "#{{tokens.text | hex_no_hash}}ff",
        "editor.background": "#{{tokens.bg | hex_no_hash}}ff",
        "editor.gutter.background": "#{{tokens.bg | hex_no_hash}}ff",
        "editor.subheader.background": "#{{tokens.surface | hex_no_hash}}ff",
        "editor.active_line.background": "#{{tokens.surface | hex_no_hash}}bf",
        "editor.highlighted_line.background": "#{{tokens.surface | hex_no_hash}}ff",
        "editor.line_number": "#{{tokens.text_muted | hex_no_hash}}80",
        "editor.active_line_number": "#{{tokens.text | hex_no_hash}}ff",
        "editor.hover_line_number": "#{{tokens.text_muted | hex_no_hash}}ff",
        "editor.invisible": "#{{tokens.text_muted | hex_no_hash}}80",
        "editor.wrap_guide": "#{{tokens.border | hex_no_hash}}0d",
        "editor.active_wrap_guide": "#{{tokens.border | hex_no_hash}}1a",
        "editor.document_highlight.read_background": "#{{tokens.accent | hex_no_hash}}1a",
        "editor.document_highlight.write_background": "#{{tokens.selection | hex_no_hash}}66",
        "terminal.background": "#{{tokens.bg | hex_no_hash}}ff",
        "terminal.foreground": "#{{tokens.text | hex_no_hash}}ff",
        "terminal.bright_foreground": "#{{tokens.text | hex_no_hash}}ff",
        "terminal.dim_foreground": "#{{tokens.text_muted | hex_no_hash}}ff",
        "terminal.ansi.black": "#{{tokens.bg | hex_no_hash}}ff",
        "terminal.ansi.bright_black": "#{{tokens.text_muted | hex_no_hash}}ff",
        "terminal.ansi.dim_black": "#{{tokens.surface | hex_no_hash}}ff",
        "terminal.ansi.red": "#{{tokens.error | hex_no_hash}}ff",
        "terminal.ansi.bright_red": "#{{tokens.error | hex_no_hash}}ff",
        "terminal.ansi.dim_red": "#{{tokens.error | hex_no_hash}}aa",
        "terminal.ansi.green": "#{{tokens.success | hex_no_hash}}ff",
        "terminal.ansi.bright_green": "#{{tokens.success | hex_no_hash}}ff",
        "terminal.ansi.dim_green": "#{{tokens.success | hex_no_hash}}aa",
        "terminal.ansi.yellow": "#{{tokens.warning | hex_no_hash}}ff",
        "terminal.ansi.bright_yellow": "#{{tokens.warning | hex_no_hash}}ff",
        "terminal.ansi.dim_yellow": "#{{tokens.warning | hex_no_hash}}aa",
        "terminal.ansi.blue": "#{{tokens.link | hex_no_hash}}ff",
        "terminal.ansi.bright_blue": "#{{tokens.link | hex_no_hash}}ff",
        "terminal.ansi.dim_blue": "#{{tokens.link | hex_no_hash}}aa",
        "terminal.ansi.magenta": "#{{tokens.accent | hex_no_hash}}ff",
        "terminal.ansi.bright_magenta": "#{{tokens.accent | hex_no_hash}}ff",
        "terminal.ansi.dim_magenta": "#{{tokens.accent | hex_no_hash}}aa",
        "terminal.ansi.cyan": "#{{tokens.accent_active | hex_no_hash}}ff",
        "terminal.ansi.bright_cyan": "#{{tokens.accent_active | hex_no_hash}}ff",
        "terminal.ansi.dim_cyan": "#{{tokens.accent_active | hex_no_hash}}aa",
        "terminal.ansi.white": "#{{tokens.text_muted | hex_no_hash}}ff",
        "terminal.ansi.bright_white": "#{{tokens.text | hex_no_hash}}ff",
        "terminal.ansi.dim_white": "#{{tokens.text_muted | hex_no_hash}}aa",
        "link_text.hover": "#{{tokens.link | hex_no_hash}}ff",
