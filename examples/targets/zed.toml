        "version_control.modified": "#{{tokens.warning | hex_no_hash}}ff",
        "version_control.deleted": "#{{tokens.error | hex_no_hash}}ff",
        "conflict": "#{{tokens.warning | hex_no_hash}}ff",
        "conflict.background": "#{{tokens.warning | hex_no_hash}}1a",
        "conflict.border": "#{{tokens.warning | hex_no_hash}}40",
        "created": "#{{tokens.success | hex_no_hash}}ff",
        "created.background": "#{{tokens.success | hex_no_hash}}1a",
        "created.border": "#{{tokens.success | hex_no_hash}}40",
        "deleted": "#{{tokens.error | hex_no_hash}}ff",
        "deleted.background": "#{{tokens.error | hex_no_hash}}1a",
        "deleted.border": "#{{tokens.error | hex_no_hash}}40",
        "error": "#{{tokens.error | hex_no_hash}}ff",
        "error.background": "#{{tokens.error | hex_no_hash}}1a",
        "error.border": "#{{tokens.error | hex_no_hash}}40",
        "hidden": "#{{tokens.text_muted | hex_no_hash}}ff",
        "hidden.background": "#{{tokens.bg_secondary | hex_no_hash}}1a",
        "hidden.border": "#{{tokens.border | hex_no_hash}}ff",
        "hint": "#{{tokens.link | hex_no_hash}}ff",
        "hint.background": "#{{tokens.link | hex_no_hash}}1a",
        "hint.border": "#{{tokens.accent | hex_no_hash}}40",
        "ignored": "#{{tokens.text_muted | hex_no_hash}}ff",
        "ignored.background": "#{{tokens.bg_secondary | hex_no_hash}}1a",
        "ignored.border": "#{{tokens.border | hex_no_hash}}ff",
        "info": "#{{tokens.link | hex_no_hash}}ff",
        "info.background": "#{{tokens.link | hex_no_hash}}1a",
        "info.border": "#{{tokens.accent | hex_no_hash}}40",
        "modified": "#{{tokens.warning | hex_no_hash}}ff",
        "modified.background": "#{{tokens.warning | hex_no_hash}}1a",
        "modified.border": "#{{tokens.warning | hex_no_hash}}40",
        "predictive": "#{{tokens.text_muted | hex_no_hash}}80",
        "predictive.background": "#{{tokens.text_muted | hex_no_hash}}1a",
        "predictive.border": "#{{tokens.text_muted | hex_no_hash}}40",
        "renamed": "#{{tokens.link | hex_no_hash}}ff",
        "renamed.background": "#{{tokens.link | hex_no_hash}}1a",
        "renamed.border": "#{{tokens.accent | hex_no_hash}}40",
        "success": "#{{tokens.success | hex_no_hash}}ff",
        "success.background": "#{{tokens.success | hex_no_hash}}1a",
        "success.border": "#{{tokens.success | hex_no_hash}}40",
        "unreachable": "#{{tokens.text_muted | hex_no_hash}}ff",
        "unreachable.background": "#{{tokens.text_muted | hex_no_hash}}1a",
        "unreachable.border": "#{{tokens.border | hex_no_hash}}ff",
        "warning": "#{{tokens.warning | hex_no_hash}}ff",
        "warning.background": "#{{tokens.warning | hex_no_hash}}1a",
        "warning.border": "#{{tokens.warning | hex_no_hash}}40",
        "players": [
          {
            "cursor": "#{{tokens.accent | hex_no_hash}}ff",
            "background": "#{{tokens.accent | hex_no_hash}}ff",
            "selection": "#{{tokens.accent | hex_no_hash}}3d"
          }
        ],
        "syntax": {
          "attribute": {"color": "#{{tokens.link | hex_no_hash}}ff"},
          "boolean": {"color": "#{{tokens.warning | hex_no_hash}}ff"},
          "comment": {"color": "#{{tokens.text_muted | hex_no_hash}}80"},
          "comment.doc": {"color": "#{{tokens.text_muted | hex_no_hash}}ff"},
          "constant": {"color": "#{{tokens.warning | hex_no_hash}}ff"},
          "constructor": {"color": "#{{tokens.link | hex_no_hash}}ff"},
          "embedded": {"color": "#{{tokens.text | hex_no_hash}}ff"},
          "emphasis": {"color": "#{{tokens.link | hex_no_hash}}ff"},
          "emphasis.strong": {"color": "#{{tokens.warning | hex_no_hash}}ff", "font_weight": 700},
          "enum": {"color": "#{{tokens.accent_active | hex_no_hash}}ff"},
          "function": {"color": "#{{tokens.link | hex_no_hash}}ff"},
          "hint": {"color": "#{{tokens.link | hex_no_hash}}aa"},
          "keyword": {"color": "#{{tokens.accent | hex_no_hash}}ff"},
          "label": {"color": "#{{tokens.link | hex_no_hash}}ff"},
          "link_text": {"color": "#{{tokens.link | hex_no_hash}}ff", "font_style": "normal"},
          "link_uri": {"color": "#{{tokens.accent_active | hex_no_hash}}ff"},
          "number": {"color": "#{{tokens.warning | hex_no_hash}}ff"},
          "operator": {"color": "#{{tokens.accent_active | hex_no_hash}}ff"},
          "predictive": {"color": "#{{tokens.text_muted | hex_no_hash}}80", "font_style": "italic"},
          "preproc": {"color": "#{{tokens.text | hex_no_hash}}ff"},
          "primary": {"color": "#{{tokens.text | hex_no_hash}}ff"},
          "property": {"color": "#{{tokens.error | hex_no_hash}}ff"},
          "punctuation": {"color": "#{{tokens.text | hex_no_hash}}ff"},
          "punctuation.bracket": {"color": "#{{tokens.text_muted | hex_no_hash}}ff"},
          "punctuation.delimiter": {"color": "#{{tokens.text_muted | hex_no_hash}}ff"},
          "punctuation.list_marker": {"color": "#{{tokens.error | hex_no_hash}}ff"},
          "punctuation.special": {"color": "#{{tokens.error | hex_no_hash}}ff"},
          "string": {"color": "#{{tokens.success | hex_no_hash}}ff"},
          "string.escape": {"color": "#{{tokens.text_muted | hex_no_hash}}ff"},
          "string.regex": {"color": "#{{tokens.warning | hex_no_hash}}ff"},
          "string.special": {"color": "#{{tokens.warning | hex_no_hash}}ff"},
          "tag": {"color": "#{{tokens.link | hex_no_hash}}ff"},
          "text.literal": {"color": "#{{tokens.success | hex_no_hash}}ff"},
          "title": {"color": "#{{tokens.error | hex_no_hash}}ff", "font_weight": 400},
          "type": {"color": "#{{tokens.accent_active | hex_no_hash}}ff"},
          "variable": {"color": "#{{tokens.text | hex_no_hash}}ff"},
          "variable.special": {"color": "#{{tokens.warning | hex_no_hash}}ff"},
          "variant": {"color": "#{{tokens.link | hex_no_hash}}ff"}
        }
      }
    }
  ]
}
"""
